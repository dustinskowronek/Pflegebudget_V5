name: Deploy to Google Apps Script
on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      - name: Write service account (JSON)
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > "$RUNNER_TEMP/service-account.json"

      # optional: sanity-check – zeigt "service_account", wenn JSON korrekt ist
      - name: Inspect SA key (optional)
        run: |
          node -e "const k=require(process.env.RUNNER_TEMP+'/service-account.json'); console.log('type:', k.type || 'n/a')"

      - name: Login clasp (Service Account)
        run: clasp login --creds "$RUNNER_TEMP/service-account.json" --service-account

      - name: Push to Apps Script
        run: clasp push
