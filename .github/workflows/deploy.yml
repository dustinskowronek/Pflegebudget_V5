name: Deploy to Google Apps Script

on:
  push:
    branches: [Neu]   # ggf. anpassen

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore service account (from BASE64 secret)
        run: |
          echo "$GCP_SA_KEY" | base64 -d > /tmp/service-account.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Login clasp
        run: clasp login --creds /tmp/service-account.json

      - name: Push to Google Apps Script
        run: clasp push -f
