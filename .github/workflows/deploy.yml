name: Deploy to Google Apps Script
on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # SA-JSON aus Secret in ~/.clasprc.json „einbetten“
      - name: Write ~/.clasprc.json from SA secret
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq
          printf '%s' '${{ secrets.GCP_SA_KEY }}' \
          | jq -c '{token: ., oauth2ClientSettings:{clientId:"",clientSecret:"",redirectUri:"http://localhost"}, isLocalCreds:true}' \
          > ~/.clasprc.json
          echo "Wrote $(wc -c < ~/.clasprc.json) bytes to ~/.clasprc.json"

      # Optional: zeigt, dass eine Auth vorhanden ist
      - name: Who am I
        run: clasp whoami || true

      # Push nach Apps Script; liest .clasp.json im Repo (scriptId + rootDir)
      - name: Push to Apps Script
        run: clasp push --force
