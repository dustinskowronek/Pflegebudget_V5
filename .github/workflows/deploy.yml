name: Deploy to Google Apps Script

on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # SA-JSON aus dem Secret schreiben (ohne kaputte Zeilenumbrüche)
      - name: Write service account (JSON)
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > "$RUNNER_TEMP/service-account.json"

      # Mit Service Account einloggen
      - name: Login clasp (Service Account)
        run: clasp login --creds "$RUNNER_TEMP/service-account.json" --service-account

      # WICHTIG: creds an die Stelle kopieren, wo clasp sie beim Push erwartet
      - name: Copy creds to clasprc
        run: cp "$RUNNER_TEMP/service-account.json" ~/.clasprc.json

      # Deploy ausführen (nutzt .clasp.json im Repo-Root; rootDir=src)
      - name: Push to Google Apps Script
        run: clasp push
