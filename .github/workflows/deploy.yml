name: Deploy to Google Apps Script

on:
  push:
    branches: [ Neu ]   # oder main, wenn du das nutzt

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      - name: Authenticate with Google
        shell: bash
        run: |
          mkdir -p /tmp
          # Secret unverändert (inkl. Zeilenumbrüchen) in Datei schreiben:
          cat > /tmp/service-account.json <<'JSON'
          ${{ secrets.GCP_SA_KEY }}
          JSON
          npx -y @google/clasp login --creds /tmp/service-account.json

      - name: Push to Google Apps Script
        run: npx -y @google/clasp push --force
