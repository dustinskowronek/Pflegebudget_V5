name: Deploy to Google Apps Script

on:
  push:
    branches: [ Neu ]   # ggf. auf main ändern

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # Service-Account-JSON aus dem Secret als ~/.clasprc.json ablegen
      - name: Write service account to clasprc
        run: |
          mkdir -p ~
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > ~/.clasprc.json

      # Deploy (nutzt .clasp.json aus dem Repo und src/ als rootDir)
      - name: Push to Google Apps Script
        run: clasp push --force
