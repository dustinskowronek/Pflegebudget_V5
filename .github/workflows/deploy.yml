name: Deploy to Google Apps Script
on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # SA-JSON aus Secret in ~/.clasprc.json schreiben
      - name: Write ~/.clasprc.json from SA secret
        run: |
          mkdir -p ~
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > ~/.clasprc.json
          # kurze Plausibilitäts-Checks (zeigen KEINE Schlüssel)
          jq -r '.client_email' ~/.clasprc.json | sed 's/@.*$//@…/' || true
          jq -r 'keys[]' ~/.clasprc.json | head -n 3 || true

      # Optional: zeigt, dass clasp die Creds findet
      - name: Who am I
        run: clasp whoami || true

      # Push nach Apps Script (liest .clasp.json + ~/.clasprc.json)
      - name: Push to Apps Script
        run: clasp push --force
