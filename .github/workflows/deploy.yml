name: Deploy to Google Apps Script

on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # Service-Account-Creds als Datei schreiben
      - name: Write service account
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > $RUNNER_TEMP/service-account.json

      # Login mit Service Account (neue clasp-Version unterstützt --service-account)
      - name: Login clasp
        run: clasp login --creds $RUNNER_TEMP/service-account.json --service-account

      # Pushen (Root ist src/, wegen .clasp.json)
      - name: Push to Apps Script
        run: clasp push
        working-directory: .
