name: Deploy to Google Apps Script
on:
  push:
    branches: [ Neu ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      # Write SA JSON from secret to a temp file
      - name: Write service account (JSON)
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > "$RUNNER_TEMP/service-account.json"

      # Create clasp session using the SA credentials (non-interactive)
      - name: Login clasp (Service Account)
        run: clasp login --creds "$RUNNER_TEMP/service-account.json"

      # Optional: show which account is active
      - name: Who am I
        run: clasp whoami

      # Push src/ to the Apps Script project defined in .clasp.json
      - name: Push to Apps Script
        run: clasp push --force
